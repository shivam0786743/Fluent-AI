name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate YAML files
        run: |
          find . -name "*.yaml" -o -name "*.yml" | head -20
          echo "All YAML files found successfully"

      - name: Check project structure
        run: |
          echo "Crossplane folder:" && ls crossplane/
          echo "Policies folder:" && ls policies/
          echo "ArgoCD folder:" && ls argocd/
          echo "Project structure validated!"
